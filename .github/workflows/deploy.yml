name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: apps/web/self-specialize-website
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: apps/web/self-specialize-website
        env:
          NEXT_PUBLIC_BASE_PATH: /specialize
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/self-specialize-website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
